<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Клікер — Лаб. №5</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-grid"></div>

  <div class="container">
    <h1 class="title">КЛІКЕР</h1>
    <p class="subtitle">Натискай швидше!</p>

    <div class="score-board">
      <div class="stat">
        <span class="stat-label">Очки</span>
        <span class="stat-value" id="score">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Рівень</span>
        <span class="stat-value" id="level">1</span>
      </div>
      <div class="stat">
        <span class="stat-label">Кліки/сек</span>
        <span class="stat-value" id="cps">0</span>
      </div>
    </div>

    <div class="click-area">
      <button id="clickBtn" class="click-btn">
        <span class="btn-inner">⚡</span>
      </button>
      <div id="particles" class="particles"></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        До рівня <span id="nextLevel">2</span>:
        <span id="progressText">0 / 50</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="upgrades">
      <h2 class="upgrades-title">Покращення</h2>
      <div class="upgrade-list">
        <button class="upgrade-btn" id="upg1" data-cost="10" data-mult="2">
          <span class="upg-icon">🔥</span>
          <span class="upg-info">
            <span class="upg-name">Подвійний клік</span>
            <span class="upg-cost">💰 10 очок</span>
          </span>
        </button>
        <button class="upgrade-btn" id="upg2" data-cost="50" data-mult="5">
          <span class="upg-icon">⚡</span>
          <span class="upg-info">
            <span class="upg-name">Мегаклік ×5</span>
            <span class="upg-cost">💰 50 очок</span>
          </span>
        </button>
        <button class="upgrade-btn" id="upg3" data-cost="200" data-mult="10">
          <span class="upg-icon">💥</span>
          <span class="upg-info">
            <span class="upg-name">Ультраклік ×10</span>
            <span class="upg-cost">💰 200 очок</span>
          </span>
        </button>
      </div>
    </div>

    <button id="resetBtn" class="reset-btn">Скинути гру</button>
  </div>

  <div id="floatContainer"></div>

  <script src="script.js"></script>
</body>
</html>
