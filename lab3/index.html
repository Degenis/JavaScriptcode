<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 3 — JavaScript Data Processing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.6rem;
      color: #58a6ff;
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }

    p.subtitle {
      color: #8b949e;
      font-size: 0.85rem;
      margin-bottom: 30px;
    }

    #console-output {
      width: 100%;
      max-width: 720px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 20px 24px;
      font-size: 0.9rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 200px;
    }

    .line-hello   { color: #3fb950; }
    .line-goodbye { color: #f78166; }
    .line-heading { color: #d2a8ff; font-weight: bold; }
    .line-info    { color: #8b949e; font-style: italic; }
    .line-data    { color: #79c0ff; }

    footer {
      margin-top: 30px;
      color: #484f58;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <h1>Laboratory Work No. 3</h1>
  <p class="subtitle">Open the browser console (F12) to see raw output — or read the styled log below.</p>

  <div id="console-output"></div>

  <footer>JavaScript &amp; IIFE — open DevTools Console for full output</footer>

  <!-- Pretty-printer: intercepts console.log and mirrors output to the page.
       Must run BEFORE the library/main scripts so their console.log calls
       are caught too. -->
  <script>
    (function () {
      var box = document.getElementById("console-output");
      var original = console.log.bind(console);

      console.log = function () {
        original.apply(console, arguments);
        var text = Array.prototype.slice.call(arguments).join(" ");

        var span = document.createElement("span");
        span.textContent = text + "\n";

        if (text.startsWith("===")) {
          span.className = "line-heading";
        } else if (text.startsWith("Approach")) {
          span.className = "line-info";
        } else if (/^(Hello|Goodbye)\s/.test(text)) {
          span.className = text.startsWith("Hello") ? "line-hello" : "line-goodbye";
        } else if (/:\s+(Hello|Goodbye)/.test(text)) {
          span.className = /Hello\s/.test(text) ? "line-data line-hello" : "line-data line-goodbye";
        } else {
          span.className = "line-info";
        }

        box.appendChild(span);
      };
    })();
  </script>

  <!-- External libraries must be loaded before main.js -->
  <script src="hello.js"></script>
  <script src="goodbye.js"></script>
  <script src="main.js"></script>
</body>
</html>
