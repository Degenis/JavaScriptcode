<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lab 4 — Sorting Library</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0e1117; --surface:#161b22; --border:#30363d; --text:#c9d1d9;
      --muted:#8b949e; --accent:#58a6ff; --green:#3fb950;
      --yellow:#d29922; --red:#f78166; --purple:#d2a8ff;
    }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); padding:32px 20px; min-height:100vh; }
    h1 { font-size:1.5rem; color:var(--accent); margin-bottom:4px; }
    .subtitle { color:var(--muted); font-size:.85rem; margin-bottom:28px; }
    .controls { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:24px; align-items:center; }
    .controls label { color:var(--muted); font-size:.85rem; }
    select, button { background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:6px 14px; font-size:.85rem; cursor:pointer; transition:border-color .15s; }
    select:focus, button:hover { border-color:var(--accent); outline:none; }
    button.primary { background:#1f6feb; border-color:#388bfd; color:#fff; font-weight:600; }
    button.primary:hover { background:#388bfd; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:16px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px 18px; display:flex; flex-direction:column; gap:8px; }
    .card-title { font-weight:600; color:var(--purple); font-size:.95rem; display:flex; justify-content:space-between; align-items:center; }
    .badge { font-size:.7rem; padding:2px 8px; border-radius:20px; background:#1f3a5f; color:var(--accent); }
    .stats { display:flex; gap:16px; font-size:.8rem; color:var(--muted); }
    .stats span { display:flex; flex-direction:column; }
    .stats b { color:var(--green); font-size:1.05rem; }
    .warn { color:var(--yellow); font-size:.78rem; }
    .array-preview { font-family:'Courier New',monospace; font-size:.72rem; color:var(--muted); background:#0d1117; border-radius:5px; padding:6px 10px; max-height:60px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .array-label { font-size:.75rem; color:var(--muted); margin-bottom:2px; }
    .time { color:var(--muted); font-size:.75rem; text-align:right; margin-top:4px; }
    #sparse-info { background:#271e00; border:1px solid #5a4500; border-radius:8px; padding:10px 14px; font-size:.83rem; color:var(--yellow); margin-bottom:16px; display:none; }
    #placeholder { color:var(--muted); text-align:center; padding:48px 0; font-size:.9rem; }
  </style>
</head>
<body>

<h1>Лабораторна робота №4</h1>
<p class="subtitle">Бібліотека сортування масивів — SortLib · демонстрація усіх методів</p>

<div class="controls">
  <label>Масив:</label>
  <select id="arrayType">
    <option value="dense">Нерозріджений (100 елементів)</option>
    <option value="sparse">Розріджений (100 позицій, ~30% undefined)</option>
  </select>
  <label>Порядок:</label>
  <select id="direction">
    <option value="asc">За зростанням ↑</option>
    <option value="desc">За спаданням ↓</option>
  </select>
  <button class="primary" onclick="runAll()">▶ Запустити всі методи</button>
</div>

<div id="sparse-info"></div>
<div id="results"><div id="placeholder">Натисніть «Запустити всі методи» для перегляду результатів.</div></div>

<script>
// ═══════════════════════════════════════════════════════════════
// sortLib.js — вбудована бібліотека SortLib (псевдопростір імен)
// ═══════════════════════════════════════════════════════════════
var SortLib = (function () {

  function _prepare(arr) {
    var defined = [], undefinedCount = 0;
    for (var i = 0; i < arr.length; i++) {
      if (arr[i] === undefined) undefinedCount++;
      else defined.push(arr[i]);
    }
    return { defined: defined, undefinedCount: undefinedCount };
  }

  function _finish(name, sorted, undefinedCount, comparisons, swaps) {
    var result = sorted.slice();
    for (var i = 0; i < undefinedCount; i++) result.push(undefined);
    var msg = "[" + name + "] порівнянь: " + comparisons + ", обмінів/переміщень: " + swaps;
    if (undefinedCount > 0)
      msg += " | ⚠ знайдено " + undefinedCount + " undefined-елемент(и) — їх переміщено в кінець масиву";
    console.log(msg);
    return result;
  }

  function _cmp(a, b, asc) { return asc ? a - b : b - a; }

  function bubbleSort(arr, ascending) {
    if (ascending === undefined) ascending = true;
    var p = _prepare(arr), a = p.defined, n = a.length;
    var comparisons = 0, swaps = 0;
    for (var i = 0; i < n - 1; i++) {
      var swapped = false;
      for (var j = 0; j < n - 1 - i; j++) {
        comparisons++;
        if (_cmp(a[j], a[j+1], ascending) > 0) {
          var tmp = a[j]; a[j] = a[j+1]; a[j+1] = tmp; swaps++; swapped = true;
        }
      }
      if (!swapped) break;
    }
    return _finish("Bubble Sort", a, p.undefinedCount, comparisons, swaps);
  }

  function selectionSort(arr, ascending) {
    if (ascending === undefined) ascending = true;
    var p = _prepare(arr), a = p.defined, n = a.length;
    var comparisons = 0, swaps = 0;
    for (var i = 0; i < n - 1; i++) {
      var extremeIdx = i;
      for (var j = i + 1; j < n; j++) {
        comparisons++;
        if (_cmp(a[j], a[extremeIdx], ascending) < 0) extremeIdx = j;
      }
      if (extremeIdx !== i) {
        var tmp = a[i]; a[i] = a[extremeIdx]; a[extremeIdx] = tmp; swaps++;
      }
    }
    return _finish("Selection Sort", a, p.undefinedCount, comparisons, swaps);
  }

  function insertionSort(arr, ascending) {
    if (ascending === undefined) ascending = true;
    var p = _prepare(arr), a = p.defined, n = a.length;
    var comparisons = 0, swaps = 0;
    for (var i = 1; i < n; i++) {
      var key = a[i], j = i - 1;
      while (j >= 0) {
        comparisons++;
        if (_cmp(a[j], key, ascending) > 0) { a[j+1] = a[j]; swaps++; j--; } else break;
      }
      a[j+1] = key;
    }
    return _finish("Insertion Sort", a, p.undefinedCount, comparisons, swaps);
  }

  function shellSort(arr, ascending) {
    if (ascending === undefined) ascending = true;
    var p = _prepare(arr), a = p.defined, n = a.length;
    var comparisons = 0, swaps = 0;
    var gap = 1;
    while (gap < Math.floor(n / 3)) gap = gap * 3 + 1;
    while (gap >= 1) {
      for (var i = gap; i < n; i++) {
        var key = a[i], j = i - gap;
        while (j >= 0) {
          comparisons++;
          if (_cmp(a[j], key, ascending) > 0) { a[j+gap] = a[j]; swaps++; j -= gap; } else break;
        }
        a[j+gap] = key;
      }
      gap = Math.floor((gap - 1) / 3);
    }
    return _finish("Shell Sort", a, p.undefinedCount, comparisons, swaps);
  }

  function quickSort(arr, ascending) {
    if (ascending === undefined) ascending = true;
    var p = _prepare(arr), a = p.defined.slice();
    var comparisons = 0, swaps = 0;

    function _partition(lo, hi) {
      var mid = Math.floor((lo + hi) / 2);
      if (_cmp(a[lo], a[mid], ascending) > 0) { var t=a[lo]; a[lo]=a[mid]; a[mid]=t; swaps++; }
      if (_cmp(a[lo], a[hi],  ascending) > 0) { var t=a[lo]; a[lo]=a[hi];  a[hi]=t;  swaps++; }
      if (_cmp(a[mid],a[hi],  ascending) > 0) { var t=a[mid];a[mid]=a[hi]; a[hi]=t;  swaps++; }
      var pivot = a[mid];
      var t2 = a[mid]; a[mid] = a[hi-1]; a[hi-1] = t2; swaps++;
      var i = lo, j = hi - 1;
      while (true) {
        comparisons++; while (_cmp(a[++i], pivot, ascending) < 0) comparisons++;
        comparisons++; while (_cmp(a[--j], pivot, ascending) > 0) comparisons++;
        if (i >= j) break;
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp; swaps++;
      }
      var tmp2 = a[i]; a[i] = a[hi-1]; a[hi-1] = tmp2; swaps++;
      return i;
    }

    function _qsort(lo, hi) {
      if (hi - lo < 10) {
        for (var i = lo + 1; i <= hi; i++) {
          var key = a[i], j = i - 1;
          while (j >= lo) {
            comparisons++;
            if (_cmp(a[j], key, ascending) > 0) { a[j+1]=a[j]; swaps++; j--; } else break;
          }
          a[j+1] = key;
        }
        return;
      }
      var pivotIdx = _partition(lo, hi);
      _qsort(lo, pivotIdx - 1);
      _qsort(pivotIdx + 1, hi);
    }

    if (a.length > 1) _qsort(0, a.length - 1);
    return _finish("Quick Sort (Hoare)", a, p.undefinedCount, comparisons, swaps);
  }

  return { bubbleSort, selectionSort, insertionSort, shellSort, quickSort };
})();

// ═══════════════════════════════════════════════════════════════
// main.js — демонстрація
// ═══════════════════════════════════════════════════════════════
function makeDense(n) {
  var a = [], s = 42;
  for (var i = 0; i < n; i++) {
    s = (s * 1664525 + 1013904223) & 0x7fffffff;
    a.push((s % 1000) - 500);
  }
  return a;
}

function makeSparse(n, sparsity) {
  var dense = makeDense(n), a = new Array(n);
  for (var i = 0; i < n; i++) {
    var h = ((i * 2654435761) >>> 0) % 100;
    if (h >= sparsity * 100) a[i] = dense[i];
  }
  return a;
}

var _lastLog = "";
var _origLog = console.log.bind(console);
console.log = function() {
  _origLog.apply(console, arguments);
  _lastLog = Array.prototype.slice.call(arguments).join(" ");
};

function parseLog(msg) {
  var comp = (msg.match(/порівнянь: (\d+)/) || [])[1] || "?";
  var sw   = (msg.match(/обмінів\/переміщень: (\d+)/) || [])[1] || "?";
  var warn = msg.includes("⚠") ? msg.split("|")[1].trim() : "";
  return { comp, sw, warn };
}

function runAll() {
  var type = document.getElementById("arrayType").value;
  var asc  = document.getElementById("direction").value === "asc";
  var arr  = type === "dense" ? makeDense(100) : makeSparse(100, 0.30);

  var undefCount = 0;
  for (var i = 0; i < arr.length; i++) if (arr[i] === undefined) undefCount++;

  var sparseInfo = document.getElementById("sparse-info");
  if (undefCount > 0) {
    sparseInfo.style.display = "block";
    sparseInfo.textContent = "⚠ Розріджений масив: " + undefCount + " undefined-елемент(и) з " +
      arr.length + " — їх буде переміщено в кінець відсортованого масиву.";
  } else {
    sparseInfo.style.display = "none";
  }

  var methods = [
    { name:"Bubble Sort",       key:"bubbleSort",    label:"Обмін" },
    { name:"Selection Sort",    key:"selectionSort", label:"Мінімальних елементів" },
    { name:"Insertion Sort",    key:"insertionSort", label:"Вставки" },
    { name:"Shell Sort",        key:"shellSort",     label:"Шелла" },
    { name:"Quick Sort (Hoare)",key:"quickSort",     label:"Хоара (швидке)" },
  ];

  var cards = "";
  methods.forEach(function(m) {
    var t0 = performance.now();
    _lastLog = "";
    var sorted = SortLib[m.key](arr.slice(), asc);
    var t1 = performance.now();
    var stats = parseLog(_lastLog);
    var elapsed = (t1 - t0).toFixed(2);
    var preview = sorted.slice(0, 20).map(v => v === undefined ? "undef" : v).join(", ") +
                  (sorted.length > 20 ? " …" : "");
    cards += '<div class="card">' +
      '<div class="card-title">' + m.name + '<span class="badge">' + m.label + '</span></div>' +
      '<div class="stats"><span>Порівнянь<b>' + stats.comp + '</b></span><span>Обмінів<b>' + stats.sw + '</b></span></div>' +
      (stats.warn ? '<div class="warn">⚠ ' + stats.warn + '</div>' : '') +
      '<div class="array-label">Результат (перші 20):</div>' +
      '<div class="array-preview">' + preview + '</div>' +
      '<div class="time">⏱ ' + elapsed + ' мс</div>' +
      '</div>';
  });

  document.getElementById("results").innerHTML = '<div class="grid">' + cards + '</div>';
}
</script>
</body>
</html>
